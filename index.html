<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mytimes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Major+Mono+Display&family=VT323&family=Audiowide&family=Cinzel:wght@400;700&family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">Mytimes</div>
      <nav class="nav">
        <button class="nav-item active" data-view="clock">
          <span class="nav-icon">◴</span><span>Clock</span>
        </button>
        <button class="nav-item" data-view="stopwatch">
          <span class="nav-icon">⏱</span><span>Stopwatch</span>
        </button>
        <button class="nav-item" data-view="timer">
          <span class="nav-icon">⏳</span><span>Timer</span>
        </button>
        <button class="nav-item" data-view="alarm">
          <span class="nav-icon">⏰</span><span>Alarm</span>
        </button>
        <button class="nav-item" data-view="focus">
          <span class="nav-icon">📚</span><span>Pomodoro</span>
        </button>
        <button class="nav-item" data-view="world">
          <span class="nav-icon">🌐</span><span>World Clock</span>
        </button>
      </nav>
      <div class="sidebar-foot">v0.1</div>
    </aside>

    <main class="main" id="main">
      <!-- View renders here -->
    </main>
  </div>

  <script src="js/shared.js"></script>
  <script src="js/clock.js"></script>
  <script src="js/stopwatch.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/alarm.js"></script>
  <script src="js/focus.js"></script>
  <script src="js/world.js"></script>
  <script src="app.js"></script>
</body>
</html>
